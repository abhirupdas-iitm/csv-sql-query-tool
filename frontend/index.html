<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SheetQL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 🔥 AUTH LOADER -->
    <div id="authLoader" class="loader">
        <div class="spinner"></div>
        <p>Checking authentication...</p>
    </div>

    <!-- 🔥 GLOBAL PROCESS LOADER -->
    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <!-- 🔥 MAIN APP -->
    <div id="appContent" class="hidden">
        <div class="app-layout">

            <!-- 🔥 SIDEBAR -->
            <div class="sidebar" id="sidebar">
                <h3>History</h3>
                <div id="historyList">No queries yet...</div>
            </div>

            <!-- 🔥 MAIN CONTENT -->
            <div class="main-content">

                <!-- AUTH -->
                <div class="auth-bar">
                    <div id="menuToggle">☰</div>
                    <input type="email" id="email" placeholder="Email">
                    <input type="password" id="password" placeholder="Password">
                    <button onclick="googleLogin()">Continue with Google</button>
                    <button onclick="signup()">Sign Up</button>
                    <button onclick="login()">Login</button>
                    <button onclick="logout()">Logout</button>
                    <div class="user-info">
                        <span id="authStatus"></span>
                        <img id="profilePic" width="30">
                    </div>
                </div>

                <!-- HEADER -->
                <div class="header">
                    <h1>SheetQL</h1>
                </div>

                <!-- UPLOAD -->
                <div class="upload-center">
                    <button class="custom-file-upload" id="chooseFileBtn">
                        Choose File
                    </button>
                    <input type="file" id="fileInput" hidden>
                    <span id="fileName">No file chosen</span>
                </div>

                <!-- TABLES -->
                <div class="sheet-grid" id="tables"></div>

                <!-- PANELS -->
                <div class="bottom-panels">

                    <div class="top-row">
                        <div class="resizable-container">

                            <div class="panel logs-panel" id="logsPanel">
                                <h3>SQL Logs</h3>
                                <div class="logs" id="logs"></div>
                            </div>

                            <div class="divider" id="divider"></div>

                            <div class="panel query-panel" id="queryPanel">
                                <h3>SQL Query</h3>
                                <textarea id="query"></textarea>
                                <button onclick="runQuery()">Run</button>
                            </div>

                        </div>
                    </div>

                    <div class="panel results-panel">
                        <h3>Results</h3>
                        <div id="result"></div>
                    </div>

                </div>

            </div>
        </div>

        <script src="script.js"></script>
        <script type="module" src="auth.js"></script>

        <script>
            document.getElementById("chooseFileBtn").addEventListener("click", () => {
                document.getElementById("fileInput").click();
            });

            document.getElementById("fileInput").addEventListener("change", () => {
                const file = document.getElementById("fileInput").files[0];
                if (file) {
                    document.getElementById("fileName").innerText = file.name;
                    uploadCSV();
                }
            });
        </script>

</body>

</html>
