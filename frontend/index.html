<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SheetQL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>

<body>
    <!-- 🔥 AUTH LOADER -->
    <div id="authLoader" class="loader">
        <div class="spinner"></div>
        <p>Checking authentication...</p>
    </div>

    <!-- 🔥 GLOBAL PROCESS LOADER -->
    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <!-- 🔥 MAIN APP -->
    <div id="appContent" class="hidden">
        <div class="app-layout">

            <!-- 🔥 SIDEBAR -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" onclick="switchSidebarTab('history')">History</button>
                    <button class="tab-btn" onclick="switchSidebarTab('saved')">Saved</button>
                </div>
                <div id="historyTab" class="sidebar-content">
                    <div id="historyList">No queries yet...</div>
                </div>
                <div id="savedTab" class="sidebar-content hidden">
                    <div id="savedList">No snippets saved yet...</div>
                </div>
            </div>

            <!-- 🔥 MAIN CONTENT -->
            <div class="main-content">

                <!-- AUTH -->
                <div class="auth-bar">
                    <div id="menuToggle">☰</div>
                    <input type="email" id="email" placeholder="Email">
                    <input type="password" id="password" placeholder="Password">
                    <button onclick="googleLogin()">Continue with Google</button>
                    <button onclick="signup()">Sign Up</button>
                    <button onclick="login()">Login</button>
                    <button onclick="logout()">Logout</button>
                    <div class="user-info">
                        <span id="authStatus"></span>
                        <img id="profilePic" width="30">
                    </div>
                </div>

                <!-- HEADER -->
                <div class="header">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <h1>SheetQL</h1>
                        <button class="custom-file-upload" id="themeBtn" onclick="toggleSettings(); event.stopPropagation();">Choose Theme</button>
                    </div>
                </div>
                
                <!-- SETTINGS PANEL -->
                <div id="settingsPanel" class="panel settings-panel hidden">
                    <h3>Personalization</h3>
                    <div class="setting-item">
                        <label>Accent Color</label>
                        <input type="color" id="accentColor" value="#00e676" onchange="updateThemeColor(this.value)">
                    </div>
                </div>

                <!-- UPLOAD -->
                <div class="upload-center">
                    <button class="custom-file-upload" id="chooseFileBtn">
                        Choose File
                    </button>
                    <button id="viewERDiagramBtn" class="custom-file-upload hidden" onclick="showERDiagram()">
                        View ER Diagram
                    </button>
                    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.sql" hidden>
                    <span id="fileName">No file chosen</span>
                </div>

                <!-- TABLES -->
                <div class="sheet-grid" id="tables"></div>

                <!-- PANELS -->
                <div class="bottom-panels">

                    <div class="top-row">
                        <div class="resizable-container">

                            <div class="panel logs-panel" id="logsPanel">
                                <h3>SQL Logs</h3>
                                <div class="logs" id="logs"></div>
                            </div>

                            <div class="divider" id="divider"></div>

                            <div class="panel query-panel" id="queryPanel">
                                <div class="query-header">
                                    <h3>SQL Query</h3>
                                </div>
                                <div class="editor-container">
                                    <pre id="editorOverlay" aria-hidden="true"><code class="language-sql"></code></pre>
                                    <textarea id="query" spellcheck="false" oninput="syncEditor()"></textarea>
                                </div>
                                <div class="query-actions">
                                    <div class="snippet-actions">
                                        <input type="text" id="snippetName" placeholder="Snippet name...">
                                        <button onclick="saveSnippet()" title="Save as Snippet">💾</button>
                                    </div>
                                    <button class="run-btn" onclick="runQuery()" title="Run Query">▶ Run</button>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="panel results-panel">
                        <div class="results-header">
                            <h3>Results <span id="queryMetadata" style="font-size: 12px; color: #888; margin-left:10px;"></span></h3>
                            <div class="results-actions">
                                <div id="chartZoomControls" class="hidden" style="display: flex; gap: 10px; align-items: center; margin-right: 10px;">
                                    <div style="display: flex; align-items: center; gap: 4px;" title="Horizontal Zoom">
                                        <span style="font-size: 14px; color: var(--accent);">↔</span>
                                        <input type="range" id="chartZoomX" min="1" max="5" step="0.1" value="1" oninput="updateChartZoom()" style="width: 70px; cursor: pointer;">
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 4px;" title="Vertical Zoom">
                                        <span style="font-size: 14px; color: var(--accent);">↕</span>
                                        <input type="range" id="chartZoomY" min="1" max="5" step="0.1" value="1" oninput="updateChartZoom()" style="width: 70px; cursor: pointer;">
                                    </div>
                                </div>
                                <select id="chartType" class="action-select hidden" onchange="renderChart()">
                                    <option value="bar">Bar Chart</option>
                                    <option value="line">Line Chart</option>
                                    <option value="pie">Pie Chart</option>
                                    <option value="radar">Radar Chart</option>
                                </select>
                                <button id="toggleChartBtn" onclick="toggleChartView()" class="action-btn hidden" title="Toggle between Table and Chart View">📊 Visualise</button>
                                <button id="downloadResultBtn" onclick="downloadCurrentResult()" class="action-btn hidden" title="Download current results as CSV">📥 Download CSV</button>
                            </div>
                        </div>
                        <div id="resultTableContainer">
                            <div id="result"></div>
                        </div>
                        <div id="resultChartContainer" class="hidden">
                            <canvas id="resultChart"></canvas>
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <!-- DATALIST FOR AUTOCOMPLETE -->
        <datalist id="dbNamesList"></datalist>

        <!-- ER DIAGRAM MODAL -->
        <div id="erModal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal" onclick="closeERDiagram()">&times;</span>
                <h2 style="color: var(--accent-green-bright); text-align: center;">Entity-Relationship Diagram</h2>
                <div id="erDiagramContainer" class="mermaid"></div>
            </div>
        </div>

        <!-- 🦆 DuckDB Dynamic script -->
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
        <script src="sql-script-parser.js?v=1"></script>
        <script src="duckdb.js?v=12"></script>
        <script src="script.js?v=14"></script>
        <script src="floating-symbols.js"></script>
        <script type="module" src="auth.js?v=11"></script>

        <script>
            document.getElementById("chooseFileBtn").addEventListener("click", () => {
                document.getElementById("fileInput").click();
            });

            document.getElementById("fileInput").addEventListener("change", () => {
                const file = document.getElementById("fileInput").files[0];
                if (file) {
                    document.getElementById("fileName").innerText = file.name;
                    uploadCSV();
                }
            });
        </script>
        <script>
            window.addEventListener("load", () => {
                document.body.classList.add("fade-in");
            });
        </script>
</body>

</html>
