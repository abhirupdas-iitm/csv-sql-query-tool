<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SheetQL 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔐 AUTH BAR -->
    <div class="auth-bar">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
        <span id="authStatus">Not logged in</span>
    </div>

    <!-- 🔝 HEADER -->
    <div class="header">
        <h1>SheetQL 🚀</h1>
    </div>

    <!-- 📂 TOP UPLOAD BAR (CENTERED) -->
    <div class="top-upload">
        <input type="file" id="fileInput">
        <button onclick="uploadCSV()">Upload File</button>
    </div>

    <!-- 🧠 MAIN CONTENT -->
    <div class="main-grid">

        <!-- 📁 LEFT: SHEETS -->
        <div class="sheet-panel">
            <h3>Tables</h3>
            <div id="tables" class="sheet-container"></div>
        </div>

        <!-- ⚡ RIGHT: WORKSPACE -->
        <div class="workspace-grid">

            <!-- 🖥 QUERY PANEL -->
            <div class="panel">
                <h3>SQL Query</h3>
                <textarea id="query">SELECT * FROM default__data;</textarea>
                <button onclick="runQuery()">Run</button>
            </div>

            <!-- 📊 RESULTS PANEL -->
            <div class="panel">
                <h3>Results</h3>
                <div id="result"></div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
    <script type="module" src="auth.js"></script>

</body>

</html>
